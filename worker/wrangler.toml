name = "mpp-tx-scheduler"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[triggers]
crons = ["* * * * *"]  # every minute

[[d1_databases]]
binding = "DB"
database_name = "mpp-tx-scheduler"
database_id = ""  # filled after `wrangler d1 create mpp-tx-scheduler`

[vars]
MPP_SECRET_KEY = ""  # set via `wrangler secret put MPP_SECRET_KEY`
RECIPIENT_ADDRESS = ""  # your wallet address for receiving payment
RPC_URL = "https://rpc.moderato.tempo.xyz"
